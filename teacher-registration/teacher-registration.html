<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Registration</title>
    <!-- Bootstrap 4 -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .register-container {
            max-width: 800px; /* Wider for 2 columns */
            margin: 50px auto;
            background: #ffffff;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .form-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .form-header h2 {
            color: #4e54c8;
            font-weight: 700;
        }
        .form-control {
            border-radius: 5px;
            height: 45px;
        }
        label {
            font-weight: 600;
            color: #555;
            margin-top: 10px;
        }
        .btn-custom {
            background: #4e54c8;
            color: white;
            font-size: 18px;
            padding: 12px;
            border-radius: 5px;
            width: 100%;
            border: none;
            transition: 0.3s;
            margin-top: 20px;
        }
        .btn-custom:hover {
            background: #3c4099;
        }
        /* Ensure dropdown arrows are visible */
        select.form-control {
            background-color: #fff;
            color: #333;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="register-container">
        <div class="form-header">
            <h2><i class="fas fa-chalkboard-teacher"></i> Teacher Registration</h2>
            <p class="text-muted">Create your account to start managing quizzes</p>
        </div>

        <!-- 
           IMPORTANT: No external JS interfering. 
           Submit directly to teacher_registration.php 
        -->
        <form action="teacher_registration.php" method="POST" id="regForm">
            
            <!-- Row 1 -->
            <div class="form-row">
                <div class="col-md-6">
                    <label>First Name <span class="text-danger">*</span></label>
                    <input type="text" name="firstName" class="form-control" placeholder="Enter first name" required>
                </div>
                <div class="col-md-6">
                    <label>Last Name <span class="text-danger">*</span></label>
                    <input type="text" name="lastName" class="form-control" placeholder="Enter last name" required>
                </div>
            </div>

            <!-- Row 2 -->
            <div class="form-row">
                <div class="col-md-6">
                    <label>Username <span class="text-danger">*</span></label>
                    <input type="text" name="username" class="form-control" placeholder="Choose a username" required>
                </div>
                <div class="col-md-6">
                    <label>Email <span class="text-danger">*</span></label>
                    <input type="email" name="email" class="form-control" placeholder="Enter email" required>
                </div>
            </div>

            <!-- Row 3 -->
            <div class="form-row">
                <div class="col-md-6">
                    <label>Contact Number</label>
                    <input type="tel" name="contactNumber" class="form-control" placeholder="Phone number">
                </div>
                <div class="col-md-6">
                    <label>Gender</label>
                    <select name="gender" class="form-control" required>
                        <option value="">Select Gender</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
            </div>

            <!-- Row 4 -->
            <div class="form-row">
                <div class="col-md-6">
                    <label>Qualification <span class="text-danger">*</span></label>
                    <select name="qualifications" class="form-control" required>
                        <option value="">Select Qualification</option>
                        <option value="B.Ed">B.Ed</option>
                        <option value="B.Sc">B.Sc</option>
                        <option value="M.Sc">M.Sc</option>
                        <option value="Ph.D">Ph.D</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label>Subject Specialization <span class="text-danger">*</span></label>
                    <!-- ID 'subjectDropdown' used by JS below -->
                    <select name="subject" id="subjectDropdown" class="form-control" required>
                        <option value="">Loading Subjects...</option>
                    </select>
                    <small class="text-muted">If list is empty, refresh page.</small>
                </div>
            </div>

            <!-- Row 5 -->
            <div class="form-row">
                <div class="col-md-6">
                    <label>Institution</label>
                    <input type="text" name="institution" class="form-control" placeholder="School/College Name">
                </div>
                <div class="col-md-6">
                    <label>City</label>
                    <input type="text" name="city" class="form-control" placeholder="City">
                </div>
            </div>

            <hr class="my-4">

            <!-- Row 6 -->
            <div class="form-row">
                <div class="col-md-6">
                    <label>Password <span class="text-danger">*</span></label>
                    <input type="password" name="password" class="form-control" placeholder="At least 6 chars" required minlength="6">
                </div>
                <div class="col-md-6">
                    <label>Confirm Password <span class="text-danger">*</span></label>
                    <input type="password" name="confirmPassword" class="form-control" placeholder="Repeat password" required>
                </div>
            </div>

            <button type="submit" class="btn btn-custom">Create Account</button>
            
            <div class="text-center mt-3">
                <a href="../teacher-login/teacher-login.html">Already have an account? Login</a>
            </div>

        </form>
    </div>
</div>

<script>
    // Simple inline script to fetch subjects
    window.addEventListener('DOMContentLoaded', () => {
        const dropdown = document.getElementById('subjectDropdown');
        
        fetch('../index/get_subjects_api.php')
            .then(response => {
                if (!response.ok) throw new Error("API Error");
                return response.json();
            })
            .then(data => {
                dropdown.innerHTML = '<option value="">Select Subject</option>';
                if(data.length === 0) {
                     dropdown.innerHTML += '<option value="" disabled>No subjects found</option>';
                }
                data.forEach(sub => {
                    const option = document.createElement('option');
                    option.value = sub.subject_name;
                    option.textContent = sub.subject_name;
                    dropdown.appendChild(option);
                });
            })
            .catch(err => {
                console.error(err);
                dropdown.innerHTML = '<option value="">Error loading subjects</option>';
                // If API fails, allow manual entry or just show "Other"?
                // For now, let's add a fallback 'Other' so they can at least register
                dropdown.innerHTML += '<option value="Other">Other</option>';
            });
    });
</script>

</body>
</html>
